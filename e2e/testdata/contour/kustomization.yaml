apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - upstream/00-common.yaml
  - upstream/01-contour-config.yaml
  - upstream/02-job-certgen.yaml
  - upstream/02-rbac.yaml
  - upstream/02-role-contour.yaml
  - upstream/02-service-contour.yaml
  - upstream/03-contour.yaml
  - upstream/03-envoy.yaml
  - ./service-envoy.yaml
images:
  - name: ghcr.io/projectcontour/contour
    newName: ghcr.io/cybozu/contour
    newTag: 1.33.0.1
  - name: docker.io/envoyproxy/envoy
    newName: ghcr.io/cybozu/envoy
    newTag: 1.35.7.1
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: contour
      namespace: projectcontour
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--ingress-class-name=test"
